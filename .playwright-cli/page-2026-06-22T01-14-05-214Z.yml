        - heading "Data and methods" [level=2] [ref=e836]
        - paragraph [ref=e837]: This site organizes Taipei public real-price records, quarterly market analysis, and population-by-age data for exploration and district comparison only. It is not a property appraisal, investment recommendation, or price prediction tool. Population data provides regional context and does not imply causation. Refer to official systems for authoritative records.
        - list [ref=e838]:
          - listitem [ref=e839]: Weekly total prices are converted from NT$10,000; sale unit prices are converted from NT$10,000/ping. Rental unit prices remain NTD/ping/month.
          - listitem [ref=e840]: ROC years are converted by adding 1911. Unparsed values remain in the report.
          - listitem [ref=e841]: District total population rows avoid double-counting district, village, male, and female levels.
          - listitem [ref=e842]: Real-estate and population data are compared only at district level.
